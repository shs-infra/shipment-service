name: Build and Deploy Lambda

on:
  push:
    branches: ["main"]
  create:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      - run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.build_image.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}

      - name: Build & Push
        id: build_image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

          aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

          docker build -t $IMAGE_URI . 
          docker push $IMAGE_URI
        
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}
      
      - name: Deploy to STAGE
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.FUNCTION_NAME }} \
            --image-uri ${{ needs.build.outputs.image_uri }}
      
      - name: Integration test
        run: curl -f https://<invoke_url_api_gateway>/health

  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [deploy, build]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configura AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}

      - name: Deploy to prod
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.FUNCTION_NAME }} \
            --image-uri ${{ needs.build.outputs.image_uri }}

      - name: Healthcheck
        run: curl -f https://<invoke_url_api_gateway>/health